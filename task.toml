schema_version = "1.3"
artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a JSON summary report."
keywords = ["apache", "access-log", "json", "data-processing"]

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parse a small access log and emit three deterministic summary statistics."
solution_explanation = "Read each non-empty log entry, count requests and distinct client IPs, count requested paths, and write the most frequent path to JSON."
verification_explanation = "Parse the generated JSON and compare its exact keys, types, and values against the provided access log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
network_mode = "public"
build_timeout_sec = 600.0
os = "linux"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
